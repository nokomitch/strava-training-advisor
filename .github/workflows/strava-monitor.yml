name: Strava Activity Monitor

on:
  schedule:
    # Every 10 minutes (UTC). Public repo = unlimited free minutes.
    - cron: '*/10 * * * *'
    # Weekly summary: every Sunday at UTC 11:00 = JST 20:00
    - cron: '0 11 * * 0'
  workflow_dispatch:
    inputs:
      force_notify:
        description: '強制通知テスト（最新アクティビティを無条件に通知）'
        required: false
        default: 'false'
      run_weekly_summary:
        description: '週次サマリーを強制送信'
        required: false
        default: 'false'

jobs:
  check:
    name: Check for new activities
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to git push .last_activity_id

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to get latest .last_activity_id pushed by previous run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run activity check
        id: check
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_TOKEN_EXPIRES_AT: ${{ secrets.STRAVA_TOKEN_EXPIRES_AT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ATHLETE_AET_HR: ${{ secrets.ATHLETE_AET_HR }}
          ATHLETE_ANT_HR: ${{ secrets.ATHLETE_ANT_HR }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify || 'false' }}
        run: |
          OUTPUT=$(uv run python scripts/check_new_activities.py 2>&1)
          echo "$OUTPUT"
          # Extract NEW_ACTIVITY_ID from output if present
          NEW_ID=$(echo "$OUTPUT" | grep '^NEW_ACTIVITY_ID=' | cut -d= -f2 || true)
          echo "new_activity_id=$NEW_ID" >> $GITHUB_OUTPUT

      - name: Commit updated .last_activity_id
        if: steps.check.outputs.new_activity_id != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_activity_id
          git commit -m "chore: update last activity id to ${{ steps.check.outputs.new_activity_id }}"
          git push

  weekly-summary:
    name: Send weekly training summary
    runs-on: ubuntu-latest
    # 毎週日曜 UTC 11:00 (= JST 20:00) のcron、または手動でrun_weekly_summary=trueの場合のみ実行
    if: github.event.schedule == '0 11 * * 0' || github.event.inputs.run_weekly_summary == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run weekly summary
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_TOKEN_EXPIRES_AT: ${{ secrets.STRAVA_TOKEN_EXPIRES_AT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ATHLETE_AET_HR: ${{ secrets.ATHLETE_AET_HR }}
          ATHLETE_ANT_HR: ${{ secrets.ATHLETE_ANT_HR }}
        run: uv run python scripts/weekly_summary.py
